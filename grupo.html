<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade - Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            background: #0d1117;
            position: relative;
        }
        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #161b22;
            border-bottom: 2px solid #30363d;
            flex-shrink: 0;
            min-height: 60px;
        }
        .chat-header .back {
            background: none; border: none; color: #e6edf3; font-size: 24px;
            cursor: pointer; padding: 4px 8px; border-radius: 8px;
        }
        .chat-header .back:hover { background: #21262d; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-header .info { flex: 1; min-width: 0; }
        .chat-header .info h3 { font-size: 16px; }
        .chat-header .info span { font-size: 12px; color: #8b949e; }
        .chat-header .header-btn { padding: 8px 12px; background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 18px; border-radius: 8px; }
        .chat-header .header-btn:hover { background: #21262d; color: #e6edf3; }
        .messages {
            flex: 1; padding: 12px 16px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 4px;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        .message {
            max-width: 80%; padding: 8px 14px; border-radius: 12px;
            animation: fadeIn 0.2s;
        }
        .message.own {
            align-self: flex-end;
            background: #1f6feb;
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: #161b22;
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }
        .message .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .message .msg-header strong { font-size: 12px; color: #58a6ff; }
        .message .msg-header .time { font-size: 10px; color: #8b949e; margin-left: auto; }
        .message .text { font-size: 14px; word-wrap: break-word; line-height: 1.4; }
        .message.own .text { color: #fff; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome {
            text-align: center; color: #8b949e; margin: auto; padding: 20px;
        }
        .welcome .icon { font-size: 48px; display: block; margin-bottom: 12px; }
        .welcome h3 { font-size: 20px; color: #e6edf3; margin-bottom: 6px; }
        .welcome p { font-size: 14px; }
        .input-area {
            display: flex; gap: 8px; padding: 8px 12px; background: #161b22;
            border-top: 2px solid #30363d; flex-shrink: 0; min-height: 60px;
            align-items: center;
        }
        .input-area input {
            flex: 1; padding: 10px 16px; background: #0d1117;
            border: 2px solid #30363d; border-radius: 24px;
            color: #e6edf3; font-size: 16px; outline: none; min-height: 44px;
        }
        .input-area input:focus { border-color: #58a6ff; }
        .input-area input::placeholder { color: #484f58; }
        .input-area button {
            padding: 10px 20px; background: #1f6feb; border: none; border-radius: 24px;
            color: white; font-size: 18px; cursor: pointer; min-height: 44px; min-width: 50px;
        }
        .input-area button:hover { background: #388bfd; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; color: #e6edf3; font-size: 14px; z-index: 999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); animation: toastIn 0.4s ease;
            display: none; max-width: 90%;
        }
        .toast.show { display: block; }
        .toast.success { border-color: #238636; }
        .toast.error { border-color: #da3633; }
        .toast.info { border-color: #58a6ff; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .status-conexao {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-left: 8px;
        }
        .status-conexao.online { background: #3fb950; }
        .status-conexao.offline { background: #f85149; }
        .status-conexao.conectando { background: #d29922; animation: blink 1s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @media (max-width: 480px) {
            .message { max-width: 90%; }
            .chat-header img { width: 32px; height: 32px; }
            .input-area input { font-size: 15px; padding: 8px 12px; min-height: 38px; }
            .input-area button { min-height: 38px; min-width: 42px; font-size: 16px; padding: 8px 14px; }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <button class="back" onclick="voltar()">←</button>
            <img id="chatAvatar" src="https://via.placeholder.com/40" alt="grupo">
            <div class="info">
                <h3 id="chatNome">Carregando...</h3>
                <span id="chatMembros">0 membros</span>
                <span class="status-conexao offline" id="statusConexao"></span>
                <span style="font-size:11px;color:#8b949e;" id="statusTexto">Desconectado</span>
            </div>
            <button class="header-btn" onclick="sairGrupo()">🚪</button>
        </div>

        <div class="messages" id="mensagens">
            <div class="welcome">
                <span class="icon">💬</span>
                <h3>Nenhuma mensagem</h3>
                <p>Seja o primeiro a enviar!</p>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Digite sua mensagem..." autofocus>
            <button onclick="enviarMensagem()">📤</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script>
        let usuarioAtual = null;
        let grupoAtual = null;
        let chatIniciado = false;
        let mensagensCache = [];

        function mostrarToast(msg, tipo = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast show ${tipo}`;
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function atualizarStatusConexao(status, texto) {
            const el = document.getElementById('statusConexao');
            const txt = document.getElementById('statusTexto');
            el.className = `status-conexao ${status}`;
            txt.textContent = texto;
        }

        function verificarLogin() {
            const usuarioSalvo = localStorage.getItem('usuario');
            if (!usuarioSalvo) {
                window.location.href = 'index.html';
                return;
            }
            try {
                usuarioAtual = JSON.parse(usuarioSalvo);
            } catch (e) {
                localStorage.removeItem('usuario');
                window.location.href = 'index.html';
            }
        }

        function carregarGrupo() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));

            if (!id) {
                window.location.href = 'app.html';
                return;
            }

            const grupoSalvo = localStorage.getItem('grupo_atual');
            if (grupoSalvo) {
                try {
                    const g = JSON.parse(grupoSalvo);
                    if (g.id === id) {
                        grupoAtual = g;
                        document.getElementById('chatNome').textContent = g.nome;
                        document.getElementById('chatAvatar').src = 'https://via.placeholder.com/40';
                        iniciarChat();
                        return;
                    }
                } catch (e) {}
            }

            document.getElementById('chatNome').textContent = 'Carregando...';
            carregarDadosGrupo(id);
        }

        async function carregarDadosGrupo(id) {
            try {
                const grupos = await getGrupos();
                const grupo = grupos.find(g => g.id === id);

                if (grupo) {
                    grupoAtual = grupo;
                    document.getElementById('chatNome').textContent = grupo.nome;
                    document.getElementById('chatAvatar').src = grupo.foto || 'https://via.placeholder.com/40';
                    document.getElementById('chatMembros').textContent = `${grupo.membros || 0} membros`;
                    iniciarChat();
                } else {
                    mostrarToast('❌ Grupo não encontrado', 'error');
                    setTimeout(() => window.location.href = 'app.html', 1500);
                }
            } catch (e) {
                console.error(e);
                mostrarToast('❌ Erro ao carregar grupo', 'error');
            }
        }

        function criarMensagemHTML(m) {
            const isOwn = m.usuario_id === usuarioAtual.id || m.usuario_id === 'own';
            const data = new Date(m.data_envio || m.timestamp || new Date());
            const hora = data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            return `
                <div class="message ${isOwn ? 'own' : 'other'}" data-id="${m.id || Date.now()}">
                    <div class="msg-header">
                        ${!isOwn ? `<strong>Usuário ${m.de || '?'}</strong>` : ''}
                        <span class="time">${hora}</span>
                    </div>
                    <div class="text">${m.texto}</div>
                </div>
            `;
        }

        function adicionarMensagem(m) {
            const container = document.getElementById('mensagens');
            const welcome = container.querySelector('.welcome');
            if (welcome) welcome.remove();

            // Verificar duplicata
            const id = m.id || m.timestamp || Date.now();
            const existente = container.querySelector(`[data-id="${id}"]`);
            if (existente) return;

            container.insertAdjacentHTML('beforeend', criarMensagemHTML(m));
            container.scrollTop = container.scrollHeight;
            
            // Salvar no cache
            mensagensCache.push(m);
        }

        function carregarMensagensCache() {
            const container = document.getElementById('mensagens');
            const welcome = container.querySelector('.welcome');
            if (welcome) welcome.remove();

            if (mensagensCache.length === 0) {
                container.innerHTML = `
                    <div class="welcome">
                        <span class="icon">💬</span>
                        <h3>Nenhuma mensagem</h3>
                        <p>Seja o primeiro a enviar!</p>
                    </div>
                `;
            } else {
                container.innerHTML = mensagensCache.map(m => criarMensagemHTML(m)).join('');
                container.scrollTop = container.scrollHeight;
            }
        }

        async function iniciarChat() {
            try {
                if (!chatIniciado) {
                    atualizarStatusConexao('conectando', 'Conectando...');
                    
                    const peerId = await iniciarChat(usuarioAtual.id);
                    if (peerId) {
                        chatIniciado = true;
                        atualizarStatusConexao('online', 'Conectado');
                        console.log('✅ Chat iniciado!');
                        mostrarToast('✅ Conectado ao chat!', 'success');
                    }
                }

                // Escutar mensagens recebidas
                escutarMensagens((dados) => {
                    console.log('📩 Nova mensagem recebida:', dados);
                    
                    // Verificar se é uma mensagem de texto
                    if (dados.dados && dados.dados.texto) {
                        const novaMsg = {
                            texto: dados.dados.texto,
                            de: dados.de,
                            timestamp: dados.dados.timestamp || new Date().toISOString(),
                            usuario_id: 'outro'
                        };
                        adicionarMensagem(novaMsg);
                        mostrarToast('📩 Nova mensagem recebida!', 'info');
                    }
                });

                // Carregar mensagens salvas
                const key = `chat_${grupoAtual.id}`;
                const dados = localStorage.getItem(key);
                if (dados) {
                    mensagensCache = JSON.parse(dados);
                    carregarMensagensCache();
                }

            } catch (e) {
                console.error('❌ Erro ao iniciar chat:', e);
                atualizarStatusConexao('offline', 'Erro de conexão');
                mostrarToast('⚠️ Erro ao conectar ao chat', 'error');
            }
        }

        function salvarMensagensCache() {
            const key = `chat_${grupoAtual.id}`;
            localStorage.setItem(key, JSON.stringify(mensagensCache));
        }

        async function enviarMensagem() {
            const input = document.getElementById('msgInput');
            const texto = input.value.trim();

            if (!texto || !grupoAtual) {
                if (!grupoAtual) mostrarToast('⚠️ Grupo não encontrado', 'error');
                return;
            }

            try {
                // Criar mensagem
                const msg = {
                    usuario_id: 'own',
                    texto: texto,
                    timestamp: new Date().toISOString(),
                    id: Date.now()
                };

                // Adicionar localmente
                adicionarMensagem(msg);
                salvarMensagensCache();
                input.value = '';

                // Enviar via PeerJS para o admin (usuário 1)
                const enviou = await enviarMensagemPeer(1, texto);
                
                if (enviou) {
                    mostrarToast('✅ Mensagem enviada!', 'success');
                } else {
                    // Tentar enviar para o primeiro membro do grupo
                    const dados = await apiGet();
                    if (dados) {
                        const membros = dados.grupo_usuarios
                            .filter(gu => gu.grupo_id === grupoAtual.id && gu.usuario_id !== usuarioAtual.id)
                            .map(gu => gu.usuario_id);
                        
                        if (membros.length > 0) {
                            const enviouParaMembro = await enviarMensagemPeer(membros[0], texto);
                            if (enviouParaMembro) {
                                mostrarToast('✅ Mensagem enviada!', 'success');
                            } else {
                                mostrarToast('⚠️ Mensagem salva localmente', 'info');
                            }
                        } else {
                            mostrarToast('⚠️ Nenhum outro usuário online', 'info');
                        }
                    }
                }

            } catch (e) {
                console.error('❌ Erro:', e);
                mostrarToast('❌ Erro ao enviar mensagem', 'error');
            }
        }

        async function sairGrupo() {
            if (!grupoAtual || !confirm(`Sair do grupo "${grupoAtual.nome}"?`)) return;

            try {
                const success = await sairGrupo(grupoAtual.id, usuarioAtual.id);
                if (success) {
                    mostrarToast('✅ Saiu do grupo', 'success');
                    setTimeout(() => {
                        window.location.href = 'app.html';
                    }, 500);
                } else {
                    mostrarToast('❌ Erro ao sair do grupo', 'error');
                }
            } catch (e) {
                console.error(e);
                mostrarToast('❌ Erro ao sair do grupo', 'error');
            }
        }

        function voltar() {
            window.location.href = 'app.html';
        }

        document.addEventListener('DOMContentLoaded', async function() {
            verificarLogin();

            if (!usuarioAtual) return;

            await initDB();
            carregarGrupo();

            document.getElementById('msgInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    enviarMensagem();
                }
            });

            console.log('🚀 Chat com PeerJS carregado!');
            console.log('👤 Usuário:', usuarioAtual?.nome);
        });

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    </script>

</body>
</html>
